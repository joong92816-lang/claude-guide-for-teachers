# .github/workflows/monitor.yml
name: 클로드 업데이트 모니터링
on:
  schedule:
    - cron: "0 21 * * *" # 매일 KST 06:00
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run monitor
      - name: 변경 시 검수용 PR 생성
        uses: peter-evans/create-pull-request@v6
        with:
          branch: updates/auto-${{ github.run_id }}
          title: "[검수 필요] 클로드 기능 업데이트 감지"
          commit-message: "chore: 업데이트 초안 자동 생성"
          body: "자동 모니터링이 공식 문서 변경을 감지했습니다. 초안을 검수 후 머지해 주세요. 머지 시 사이트와 Q&A 지식 베이스에 자동 반영됩니다."
      - name: 실패 알림
        if: failure()
        run: echo "::error::모니터링 실패 — 담당자 확인 필요"
